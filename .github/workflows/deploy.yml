name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /opt/NoClickMail
            git fetch origin
            git checkout main
            git pull origin main
            pnpm install
            pnpm db:migrate
            pnpm build
            pm2 delete api web course-web 2>/dev/null || true
            pm2 start ecosystem.config.cjs --update-env
            pm2 save
